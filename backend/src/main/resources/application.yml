server:
  port: 8080

spring:
  application:
    name: amm-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:amm_db}
    username: ${DB_USER:amm_user}
    password: ${DB_PASSWORD:amm_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

zeebe:
  client:
    broker:
      gatewayAddress: ${ZEEBE_HOST:localhost}:${ZEEBE_PORT:26500}
    security:
      plaintext: true
    worker:
      defaultName: amm-worker
      threads: 1

jwt:
  secret: ${JWT_SECRET:pfe-amm-jwt-secret-key-2024-must-be-32-chars-min!!}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

info:
  app:
    name: Système Gestion AMM - AMMPS
    version: 1.0.0
    organisation: AMMPS - Agence Marocaine du Médicament et des Produits de Santé
    partenaire: CDG Incept

logging:
  level:
    ma.pfe.amm: DEBUG
    io.camunda: INFO
    org.springframework.security: INFO
