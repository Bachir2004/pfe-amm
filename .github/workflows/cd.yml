name: CD — Deploy to Production

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/amm-backend
  IMAGE_FRONTEND: ${{ github.repository }}/amm-frontend

jobs:
  # ─────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: amm-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: amm-frontend:latest

  # ─────────────────────────────────────────────
  deploy:
    name: Deploy (Simulation)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Deployment simulation
        run: |
          echo "✅ Deployment simulation successful"
          echo "🐳 Services: backend:8080, frontend:3000"
          echo "📊 Monitoring: prometheus:9090, grafana:3001"
          echo "🔄 Camunda Operate: localhost:8081"
