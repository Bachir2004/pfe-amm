name: CI — Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test Spring Boot
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: amm_db_test
          POSTGRES_USER: amm_user
          POSTGRES_PASSWORD: amm_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: amm_db_test
          DB_USER: amm_user
          DB_PASSWORD: amm_pass
          JWT_SECRET: ci-test-jwt-secret-key-32-chars-min!!
          ZEEBE_HOST: localhost
          ZEEBE_PORT: 26500
        run: mvn test -B --no-transfer-progress

      - name: Generate coverage report
        working-directory: backend
        run: mvn jacoco:report -B --no-transfer-progress

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Build JAR
        working-directory: backend
        run: mvn package -DskipTests -B --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v3
        with:
          name: amm-backend-jar
          path: backend/target/*.jar

  # ─────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: amm-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: amm-frontend:${{ github.sha }}
